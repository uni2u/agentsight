name: Deploy Live Demo

# Builds the Next.js frontend as a static site and publishes it to the
# `gh-pages` branch. Cloudflare Pages serves it at agentsight.us.
# The demo auto-loads a sample snapshot on first visit when the backend
# API is unreachable.

on:
  push:
    branches: [ "master" ]
    paths:
      - "frontend/**"
      - "docs/example_record_ claude_init.log"
      - "docs/demo-*.png"
      - "docs/top-mode-demo.png"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Publish Demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare sample snapshot and images
        run: node frontend/scripts/prepare-sample.mjs

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
