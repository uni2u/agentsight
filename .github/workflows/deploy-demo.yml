name: Deploy Live Demo

# Builds the Next.js frontend as a static site and publishes it to the
# `gh-pages` branch. Cloudflare Pages is connected to this branch (via the
# Cloudflare dashboard Git integration) and serves it at the custom domain
# agentsight.us. The site is built for the domain ROOT (empty basePath), so
# Cloudflare can serve it directly with no rebuild. The demo auto-loads a real
# recorded Claude session trace on first visit.

on:
  push:
    branches: [ "master", "feat/live-demo" ]   # drop feat/live-demo after merging
    paths:
      - "frontend/**"
      - "docs/example_record_ claude_init.log"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

# Allow the action to push to the gh-pages branch.
permissions:
  contents: write

# Only one demo deploy at a time; cancel superseded runs.
concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Publish Demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bundle sample trace into the static site
        # The frontend auto-loads /sample-trace.log on first visit. This script
        # normalizes the raw recorded session (monotonic ns) to epoch ms and
        # writes it to frontend/public/, rather than committing a second 6 MB
        # copy there (it is gitignored).
        run: node frontend/scripts/prepare-sample.mjs

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        # Cloudflare Pages serves agentsight.us at the root, so no basePath.
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
