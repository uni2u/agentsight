name: Sync Eunomia Docs

# Triggers eunomia.dev to pull the latest AgentSight docs and rebuild.
# Requires a repo secret named EUNOMIA_DEV_DISPATCH_TOKEN with permission to
# dispatch workflows in eunomia-bpf/eunomia.dev.

on:
  push:
    branches: [ "master" ]
    paths:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/**"
      - ".github/workflows/sync-eunomia-docs.yml"
  workflow_dispatch:

jobs:
  dispatch:
    name: Trigger eunomia.dev document sync
    runs-on: ubuntu-latest
    steps:
      - name: Send repository dispatch
        env:
          DISPATCH_TOKEN: ${{ secrets.EUNOMIA_DEV_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "EUNOMIA_DEV_DISPATCH_TOKEN is not configured." >&2
            exit 1
          fi

          cat > dispatch.json <<EOF
          {
            "event_type": "trigger-document-sync",
            "client_payload": {
              "source_repo": "${SOURCE_REPO}",
              "source_ref": "${SOURCE_REF}",
              "source_sha": "${SOURCE_SHA}",
              "project": "agentsight"
            }
          }
          EOF

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/eunomia-bpf/eunomia.dev/dispatches \
            --data @dispatch.json
